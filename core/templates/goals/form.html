{% extends "layout.html" %}
{% block title %}New Goal{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-md-5">

        <h2 class="mb-4">New Weekly Goal</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Subject</label>
                <select name="subject_id" class="form-select" required>
                    <option value="">Select...</option>
                    {% for s in subjects %}
                    <option value="{{ s.pk }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Target Hours <span class="text-muted">(for this week)</span>
                </label>
                <div class="input-group">
                    <input type="number" name="target_hours" class="form-control"
                           min="0.5" max="40" step="0.5" value="5" required>
                    <span class="input-group-text">hours</span>
                </div>
                <div class="form-text">Ex: 5 = study 5 hours this subject this week</div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Save Goal
                </button>
                <a href="{% url 'goals_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
