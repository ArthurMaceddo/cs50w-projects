{% extends "layout.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="auth-card">
    <h2>Log in</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p>Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
</div>
{% endblock %}
