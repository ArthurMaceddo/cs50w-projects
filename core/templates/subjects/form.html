{% extends "layout.html" %}
{% block title %}{{ action }} Subject{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-md-6">

        <h2 class="mb-4">{{ action }} Subject</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Name</label>
                <input type="text" name="name" class="form-control"
                       value="{{ subject.name|default:'' }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Description <span class="text-muted">(optional)</span></label>
                <textarea name="description" class="form-control" rows="3">{{ subject.description|default:'' }}</textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Identification Color</label>
                <div class="d-flex align-items-center gap-3">
                    <input type="color" name="color" class="form-control form-control-color"
                           value="{{ subject.color|default:'#4a7490' }}">
                    <small class="text-muted">Appears on cards, progress bars, and charts</small>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Save
                </button>
                <a href="{% url 'subjects_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
