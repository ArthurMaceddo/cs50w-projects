{% extends "layout.html" %}
{% block title %} Delete Subject {% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-md-5">

        <div class="card border-danger shadow-sm">
            <div class="card-body text-center p-4">
                <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
                <h4 class="mt-3">Delete Subject?</h4>
                <p class="text-muted">
                    You are about to delete <strong>{{ subject.name }}</strong>.<br>
                    All topics, flashcards and sessions linked will be deleted permanently.
                </p>

                <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Yes, delete
                    </button>
                    <a href="{% url 'subjects_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
